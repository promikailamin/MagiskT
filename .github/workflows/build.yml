name: Build

on:
  push:
    branches: [ app, app_test ]
  pull_request:
    branches: [ app, app_test ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions: write-all

    strategy:
      matrix:
        build_type: [debug]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Verify native libraries
        run: |
          echo "========== System =========="
          pwd
          ls -la

          echo ""
          echo "========== libs directory =========="
          if [ -d libs ]; then
            find libs -type f | sort
          else
            echo "libs directory does not exist."
          fi

          echo ""
          echo "========== build downloads =========="
          if [ -d app/build/downloads ]; then
            find app/build/downloads -type f
          else
            echo "No downloaded zips yet."
          fi

          echo ""
          echo "========== ABI Verification =========="

          REQUIRED="magisk magiskboot magiskinit magiskpolicy libinit-ld.so"

          for ABI in armeabi-v7a arm64-v8a x86 x86_64 riscv64
          do
            echo ""
            echo "Checking $ABI"

            if [ ! -d "libs/$ABI" ]; then
              echo "::warning::Missing directory libs/$ABI"
              continue
            fi

            ls -la "libs/$ABI"

            for FILE in $REQUIRED
            do
              if [ -f "libs/$ABI/$FILE" ]; then
                echo "✓ $FILE"
              else
                echo "::warning::Missing libs/$ABI/$FILE"
              fi
            done
          done

      - name: Build app
        run: |
          if [ "${{ matrix.build_type }}" = "release" ]; then
            python build.py -r app
          else
            python build.py app
          fi

      - name: Build apkT
        run: |
          if [ "${{ matrix.build_type }}" = "release" ]; then
            python build.py -r apkT
          else
            python build.py apkT
          fi

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: app_${{ matrix.build_type }}
          path: out/app-*.apk

      - name: Upload apkT artifact
        uses: actions/upload-artifact@v4
        with:
          name: apkT_${{ matrix.build_type }}
          path: out/apkT-*.apk

      - name: Create Release app_r
        if: matrix.build_type == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="app_r"
          file="out/app-release.apk"
          commit=$(git rev-parse --short HEAD)
          branch=${GITHUB_REF#refs/heads/}
          build_time=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          body=$(printf "Build\n\nBranch: %s\nCommit: %s\nBuild type: release\nBuild time: %s\nActor: %s\nRepo: %s" \
            "$branch" "$commit" "$build_time" "$GITHUB_ACTOR" "$GITHUB_REPOSITORY")
          gh release delete "$tag" -y || true
          git tag -d "$tag" || true
          git push origin :refs/tags/"$tag" || true
          git tag "$tag"
          git push origin "$tag"
          gh release create "$tag" "$file" --title "Release $tag" --notes "$body"

      - name: Create Release magiskT
        if: matrix.build_type == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="magiskT"
          file="out/apkT-release.apk"
          commit=$(git rev-parse --short HEAD)
          branch=${GITHUB_REF#refs/heads/}
          build_time=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          body=$(printf "Build\n\nBranch: %s\nCommit: %s\nBuild type: release\nBuild time: %s\nActor: %s\nRepo: %s" \
            "$branch" "$commit" "$build_time" "$GITHUB_ACTOR" "$GITHUB_REPOSITORY")
          gh release delete "$tag" -y || true
          git tag -d "$tag" || true
          git push origin :refs/tags/"$tag" || true
          git tag "$tag"
          git push origin "$tag"
          gh release create "$tag" "$file" --title "Release $tag" --notes "$body"

      - name: Create Release app_d
        if: matrix.build_type == 'debug'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="app_d"
          file="out/app-debug.apk"
          commit=$(git rev-parse --short HEAD)
          branch=${GITHUB_REF#refs/heads/}
          build_time=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          body=$(printf "Build\n\nBranch: %s\nCommit: %s\nBuild type: debug\nBuild time: %s\nActor: %s\nRepo: %s" \
            "$branch" "$commit" "$build_time" "$GITHUB_ACTOR" "$GITHUB_REPOSITORY")
          gh release delete "$tag" -y || true
          git tag -d "$tag" || true
          git push origin :refs/tags/"$tag" || true
          git tag "$tag"
          git push origin "$tag"
          gh release create "$tag" "$file" --title "Release $tag" --notes "$body"