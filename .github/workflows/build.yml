name: Build

on:
  push:
    branches: [ app, app_test ]
  pull_request:
    branches: [ app, app_test ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions: write-all

    strategy:
      matrix:
        build_type: [debug]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Build app
        run: |
          if [ "${{ matrix.build_type }}" = "release" ]; then
            python build.py -vr app
          else
            python build.py -v app
          fi

      - name: Build apkT
        run: |
          if [ "${{ matrix.build_type }}" = "release" ]; then
            python build.py -vr apkT
          else
            python build.py -v apkT
          fi

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: app_${{ matrix.build_type }}
          path: out/app-*.apk

      - name: Upload apkT artifact
        uses: actions/upload-artifact@v4
        with:
          name: apkT_${{ matrix.build_type }}
          path: out/apkT-*.apk

      - name: Create Release app_r
        if: matrix.build_type == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="app_r"
          file="out/app-release.apk"
          commit=$(git rev-parse --short HEAD)
          branch=${GITHUB_REF#refs/heads/}
          build_time=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          body=$(printf "Build\n\nBranch: %s\nCommit: %s\nBuild type: release\nBuild time: %s\nActor: %s\nRepo: %s" \
            "$branch" "$commit" "$build_time" "$GITHUB_ACTOR" "$GITHUB_REPOSITORY")
          gh release delete "$tag" -y || true
          git tag -d "$tag" || true
          git push origin :refs/tags/"$tag" || true
          git tag "$tag"
          git push origin "$tag"
          gh release create "$tag" "$file" --title "Release $tag" --notes "$body"

      - name: Create Release magiskT
        if: matrix.build_type == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="magiskT"
          file="out/apkT-release.apk"
          commit=$(git rev-parse --short HEAD)
          branch=${GITHUB_REF#refs/heads/}
          build_time=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          body=$(printf "Build\n\nBranch: %s\nCommit: %s\nBuild type: release\nBuild time: %s\nActor: %s\nRepo: %s" \
            "$branch" "$commit" "$build_time" "$GITHUB_ACTOR" "$GITHUB_REPOSITORY")
          gh release delete "$tag" -y || true
          git tag -d "$tag" || true
          git push origin :refs/tags/"$tag" || true
          git tag "$tag"
          git push origin "$tag"
          gh release create "$tag" "$file" --title "Release $tag" --notes "$body"

      - name: Create Release app_d
        if: matrix.build_type == 'debug'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="app_d"
          file="out/app-debug.apk"
          commit=$(git rev-parse --short HEAD)
          branch=${GITHUB_REF#refs/heads/}
          build_time=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          body=$(printf "Build\n\nBranch: %s\nCommit: %s\nBuild type: debug\nBuild time: %s\nActor: %s\nRepo: %s" \
            "$branch" "$commit" "$build_time" "$GITHUB_ACTOR" "$GITHUB_REPOSITORY")
          gh release delete "$tag" -y || true
          git tag -d "$tag" || true
          git push origin :refs/tags/"$tag" || true
          git tag "$tag"
          git push origin "$tag"
          gh release create "$tag" "$file" --title "Release $tag" --notes "$body"
