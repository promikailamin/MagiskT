name: Build MagiskT

on:
    push:
        branches: [main, test]
    pull_request:
        branches: [main, test]
    workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest

        permissions: write-all

        strategy:
            matrix:
                build_type: [debug, release]

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  submodules: recursive
                  fetch-depth: 1

            - name: Install dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y ccache python3 python3-pip gh

            - name: Cache pip
              uses: actions/cache@v4
              with:
                  path: ~/.cache/pip
                  key: pip-${{ runner.os }}-${{ hashFiles('**/requirements.txt') }}
                  restore-keys: |
                      pip-${{ runner.os }}-

            - name: Setup ccache
              run: |
                  mkdir -p ~/.ccache
                  echo "CCACHE_DIR=$HOME/.ccache" >> $GITHUB_ENV
                  echo "CCACHE_MAXSIZE=3G" >> $GITHUB_ENV
                  echo "/usr/lib/ccache" >> $GITHUB_PATH
                  ccache --max-size=3G

            - name: Cache ccache
              uses: actions/cache@v4
              with:
                  path: ~/.ccache
                  key: ccache-${{ runner.os }}-${{ hashFiles('**/*.c','**/*.cpp','**/*.h') }}
                  restore-keys: |
                      ccache-${{ runner.os }}-

            - name: Cache Gradle
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.gradle/caches
                      ~/.gradle/wrapper
                  key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*','**/gradle-wrapper.properties') }}
                  restore-keys: |
                      gradle-${{ runner.os }}-

            - name: Setup Java
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: 17
                  cache: gradle

            - name: Setup environment
              uses: ./.github/actions/setup
              with:
                  is-asset-build: true

            - name: Replace version
              run: |
                  if [ "${{ matrix.build_type }}" = "release" ]; then
                      sed -i 's/^version=.*/version=Modified/' config.prop
                  else
                      sed -i 's/^version=.*/version=Modified:D/' config.prop
                  fi

            - name: Build Magisk
              run: |
                  if [ "${{ matrix.build_type }}" = "release" ]; then
                      python build.py -vr all
                  else
                      python build.py -v all
                  fi

            - name: Stop Gradle
              run: ./app/gradlew --stop

            - name: Check apkT apk
              id: check_apkT
              run: |
                  if [ "${{ matrix.build_type }}" = "release" ]; then
                      file="out/apkT-release.apk"
                  else
                      file="out/apkT-debug.apk"
                  fi

                  if [ -f "$file" ]; then
                      echo "exists=true" >> "$GITHUB_OUTPUT"
                  else
                      echo "exists=false" >> "$GITHUB_OUTPUT"
                  fi

            - name: Upload main apk
              uses: actions/upload-artifact@v4
              with:
                  name: magisk_${{ matrix.build_type }}
                  path: ${{ matrix.build_type == 'release' && 'out/app-release.apk' || 'out/app-debug.apk' }}

            - name: Upload apkT apk
              if: steps.check_apkT.outputs.exists == 'true'
              uses: actions/upload-artifact@v4
              with:
                  name: apkT_magisk_${{ matrix.build_type }}
                  path: ${{ matrix.build_type == 'release' && 'out/apkT-release.apk' || 'out/apkT-debug.apk' }}
                  
                        - name: Clean and rename native libraries
              run: |
                  for dir in native/out/*; do
                      if [ -d "$dir" ]; then
                          find "$dir" -type f -name "*.a" -delete

                          for file in "$dir"/*; do
                              filename=$(basename "$file")

                              if [[ -f "$file" && ! "$filename" == lib*.so ]]; then
                                  mv "$file" "$dir/lib${filename}.so"
                              fi
                          done
                      fi
                  done

            - name: Create native zip
              run: |
                  cd native/out

                  zip_name="native_${{ matrix.build_type }}.zip"

                  zip -r "../../$zip_name" \
                      arm64-v8a \
                      armeabi-v7a \
                      x86 \
                      x86_64

                  echo "ZIP_NAME=$zip_name" >> $GITHUB_ENV

            - name: Upload native zip
              uses: actions/upload-artifact@v4
              with:
                  name: native_${{ matrix.build_type }}
                  path: ${{ env.ZIP_NAME }}
                  compression-level: 0

            - name: Create GitHub Release
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  if [ "${{ matrix.build_type }}" = "release" ]; then
                      tag="build"
                      file="out/app-release.apk"
                      pro_file="out/apkT-release.apk"
                  else
                      tag="canary_build"
                      file="out/app-debug.apk"
                      pro_file="out/apkT-debug.apk"
                  fi

                  commit=$(git rev-parse --short HEAD)
                  branch=${GITHUB_REF#refs/heads/}
                  build_time=$(date -u +"%Y-%m-%d %H:%M:%S UTC")

                  body=$(printf "# Branch: %s\n# Commit: %s\n# Build time: %s\n" \
                      "$branch" \
                      "$commit" \
                      "$build_time" \

                  gh release delete "$tag" -y || true
                  git tag -d "$tag" || true
                  git push origin :refs/tags/$tag || true

                  git tag "$tag"
                  git push origin "$tag"

                  assets=("$file")

                  if [ -f "$pro_file" ]; then
                      echo "Pro APK found."
                      assets+=("$pro_file")
                  else
                      echo "Pro APK not found. Skipping."
                  fi

                  gh release create "$tag" "${assets[@]}" "${{ env.ZIP_NAME }}" \
                      --title "MagiskT Complete" \
                      --notes "$body"
